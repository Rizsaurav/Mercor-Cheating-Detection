# ============================================================
# Mercor Cheating Detection — Cost Configuration
# Single source of truth for ALL cost constants.
# Every training weight, threshold search, and eval metric
# traces back to these values.
# ============================================================

costs:
  false_negative: 600        # Missed cheater auto-passed
  fp_auto_block: 300         # Legit user auto-blocked
  fp_manual_review: 150      # Legit user sent to review
  tp_manual_review: 5        # Cheater correctly flagged for review
  correct_auto_pass: 0       # Legit user auto-passed (ideal)
  correct_auto_block: 0      # Cheater auto-blocked (ideal)

# Derived training weight (FN cost / FP-block cost)
# Used as scale_pos_weight in XGBoost / class_weight in sklearn
cost_ratio: 2.0   # 600 / 300

# Threshold grid search range
threshold_grid:
  t_pass_min: 0.01
  t_pass_max: 0.50
  t_block_min: 0.50
  t_block_max: 0.99
  step: 0.01

paths:
  data_dir: data/
  train_file: data/train.csv
  test_file: data/test.csv
  graph_file: data/social_graph.csv
  feature_meta: data/feature_metadata.json
  sample_submission: data/sample_submission.csv
  output_dir: outputs/
  models_dir: outputs/models/
  submissions_dir: outputs/submissions/
  plots_dir: outputs/plots/
  logs_dir: outputs/logs/

cv:
  n_splits: 5
  stratify: true
  random_state: 42

pseudo_label:
  neg_prob_threshold: 0.05   # Only use predictions < this as pseudo-negatives
  min_confidence: 0.95       # high_conf_clean must be True

graph:
  n_hops: 2
  pagerank_alpha: 0.85
  louvain_resolution: 1.0
